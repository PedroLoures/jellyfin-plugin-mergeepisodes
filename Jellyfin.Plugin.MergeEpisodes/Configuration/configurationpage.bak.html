<!DOCTYPE html>
<html>

<head>
    <title>Merge Episodes</title>
</head>

<body>
    <div data-role="page" class="page type-interior pluginConfigurationPage mergeEpisodesConfigurationPage"
        data-require="emby-input,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <form class="mergeEpisodesConfigurationPage">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">Merge Episodes</h2>
                        <a is="emby-linkbutton" class="raised button-alt headerHelpButton emby-button" target="_blank"
                            href="https://github.com/PedroLoures/jellyfin-plugin-mergeepisodes">Help</a>
                    </div>
                    <div class="verticalSection">
                        <p>This plugin merges repeated episodes that share the same
                            SxxExx identifier into a single entry with multiple versions.</p>
                        <br />
                    </div>
                    <br />
                    <div>
                        <h3 class="checkboxListLabel">Select paths to exclude from merging:</h3>
                        <div id="divLocations" class="paperList checkboxList checkboxList-paperList">
                        </div>
                    </div>

                    <button is="emby-button" type="button" class="raised button-submit block emby-button"
                        id="btn-save" onclick=save()><span>Save</span></button>

                    <button is="emby-button" type="button" class="raised block"
                        id="btn-merge-episodes" onclick=mergeEpisodes()><span>Merge All Episodes</span></button>
                    <button is="emby-button" type="button" class="raised block"
                        id="btn-split-episodes" onclick=splitEpisodes()><span>Split All Episodes</span></button>
                    <br />
                    <button is="emby-button" type="button" class="raised block"
                        id="btn-split-all" onclick=splitAllEpisodes()
                        style="background:#d32f2f;color:#fff"><span>&#9888; Split Everything &mdash; Fix Old Plugin Issues</span></button>
                    <br />
                    <button is="emby-button" type="button" class="raised block"
                        id="btn-stop" onclick=stopOperation() disabled><span>Stop</span></button>

                    <div id="operation-result" style="display:none; margin-top:1em; padding:1em; border:1px solid #555; border-radius:4px;">
                        <h3 id="result-title" style="margin:0 0 0.5em 0"></h3>
                        <p id="result-summary" style="margin:0 0 0.5em 0"></p>
                        <div id="result-failures" style="display:none">
                            <p style="margin:0 0 0.3em 0"><strong>Failed items:</strong></p>
                            <ul id="result-failure-list" style="margin:0; padding-left:1.5em"></ul>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            var pluginId = "f21bbed8-3a97-4d8b-88b2-48aaa65427cb";
            var isRunning = false;

            function setRunning(running) {
                isRunning = running;
                document.querySelector('#btn-merge-episodes').disabled = running;
                document.querySelector('#btn-split-episodes').disabled = running;
                document.querySelector('#btn-split-all').disabled = running;
                document.querySelector('#btn-stop').disabled = !running;
                if (running) {
                    document.querySelector('#operation-result').style.display = 'none';
                }
            }

            function showResult(title, data) {
                var container = document.querySelector('#operation-result');
                document.querySelector('#result-title').textContent = title;

                if (data.cancelled) {
                    document.querySelector('#result-summary').textContent = 'Operation was cancelled.';
                    document.querySelector('#result-failures').style.display = 'none';
                } else {
                    var summary = data.Succeeded + ' succeeded, ' + data.Failed + ' failed.';
                    document.querySelector('#result-summary').textContent = summary;

                    var failDiv = document.querySelector('#result-failures');
                    if (data.FailedItems && data.FailedItems.length > 0) {
                        var list = document.querySelector('#result-failure-list');
                        list.innerHTML = data.FailedItems.map(function (item) {
                            return '<li>' + item + '</li>';
                        }).join('');
                        failDiv.style.display = 'block';
                    } else {
                        failDiv.style.display = 'none';
                    }
                }

                container.style.display = 'block';
            }

            function runOperation(url, operationName) {
                setRunning(true);
                Dashboard.alert(operationName + "...");
                ApiClient.fetch({ url: ApiClient.getUrl(url), type: 'POST' })
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (data) {
                        setRunning(false);
                        showResult(operationName, data);
                        if (data.cancelled) {
                            Dashboard.alert(operationName + " was stopped.");
                        } else {
                            Dashboard.alert(operationName + " completed: " + data.Succeeded + " succeeded, " + data.Failed + " failed.");
                        }
                    })
                    .catch(function () {
                        setRunning(false);
                        Dashboard.alert({ message: "Unexpected error occurred!" });
                    });
            }

            function mergeEpisodes() {
                runOperation('MergeEpisodes/MergeEpisodes', 'Merge Episodes');
            }

            function splitEpisodes() {
                runOperation('MergeEpisodes/SplitEpisodes', 'Split Episodes');
            }

            function splitAllEpisodes() {
                if (!confirm('This will split ALL episodes with any merge state, including secondary items. This is intended to fix issues from older plugin versions. Continue?')) {
                    return;
                }
                runOperation('MergeEpisodes/SplitAllEpisodes', 'Split Everything (Deep Clean)');
            }

            function stopOperation() {
                var request = {
                    url: ApiClient.getUrl('MergeEpisodes/Cancel'),
                    type: 'POST'
                };
                ApiClient.fetch(request).then(function () {
                    Dashboard.alert("Stop requested. Waiting for current item to finish...");
                }).catch(function () {
                    Dashboard.alert({ message: "Failed to send stop request." });
                });
            }

            ApiClient.getPluginConfiguration(pluginId).then(function (savedConfig) {
                var config = savedConfig;

                if (!config.LocationsExcluded) {
                    config.LocationsExcluded = [];
                }

                ApiClient.getVirtualFolders().then(function (virtualFolders) {
                    loadVirtualFolders(config, virtualFolders);
                });
            });

            function loadVirtualFolders(config, virtualFolders) {
                var html = '';
                html += '<div data-role="controlgroup">';
                for (var i = 0, length = virtualFolders.length; i < length; i++) {
                    var virtualFolder = virtualFolders[i];
                    html += getFolderHtml(config, virtualFolder, i);
                }
                html += '</div>';
                document.querySelector('#divLocations').innerHTML = html;
            }

            function getFolderHtml(currentConfig, virtualFolder, index) {
                var html = '';
                for (var i = 0, length = virtualFolder.Locations.length; i < length; i++) {
                    var id = 'chkFolder' + index + '_' + i;
                    var location = virtualFolder.Locations[i];
                    var isChecked = currentConfig.LocationsExcluded.some(function (current) {
                        return current.toLowerCase() === location.toLowerCase();
                    });
                    var checkedAttribute = isChecked ? 'checked="checked"' : '';
                    html += '<label><input is="emby-checkbox" class="chkLibrary" type="checkbox" data-mini="true" id="' + id + '" name="' + id + '" data-location="' + location + '" ' + checkedAttribute + ' /><span>' + location + ' - ' + virtualFolder.Name + '</span></label>';
                }
                return html;
            }

            function save() {
                var checkboxes = document.querySelectorAll('.chkLibrary:checked');
                var folders = Array.from(checkboxes).map(function (el) {
                    return el.getAttribute('data-location');
                });

                ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                    config.LocationsExcluded = folders;
                    ApiClient.updatePluginConfiguration(pluginId, config).then(function (res) {
                        Dashboard.processPluginConfigurationUpdateResult(res);
                    });
                });
            }
        </script>
    </div>
</body>

</html>
